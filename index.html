<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>中越代购系统</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      font-family:sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:380px;
    }

    .logo{
      text-align:center;
      color:white;
      margin-bottom:40px;
    }

    .logo-icon{
      font-size:56px;
      margin-bottom:12px;
    }

    .logo-title{
      font-size:32px;
      font-weight:bold;
    }

    .logo-sub{
      color:#999;
      margin-top:10px;
      font-size:14px;
    }

    .card{
      background:white;
      border-radius:32px;
      padding:24px;
    }

    .input-group{
      margin-bottom:20px;
    }

    .label{
      font-size:14px;
      color:#666;
      margin-bottom:8px;
      display:block;
    }

    .input{
      width:100%;
      border:1px solid #ddd;
      border-radius:18px;
      padding:16px;
      font-size:16px;
      outline:none;
    }

    .input:focus{
      border-color:black;
    }

    .login-btn{
      width:100%;
      background:black;
      color:white;
      border:none;
      border-radius:20px;
      padding:16px;
      font-size:18px;
      margin-top:10px;
      cursor:pointer;
      transition:0.2s;
    }

    .login-btn:active{
      transform:scale(0.98);
    }

    .login-btn:disabled{
      opacity:0.6;
    }

    .status{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      min-height:20px;
    }

    .bottom{
      text-align:center;
      color:#666;
      font-size:12px;
      margin-top:24px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="logo">

      <div class="logo-icon">
        📦
      </div>

      <div class="logo-title">
        中越代购系统
      </div>

      <div class="logo-sub">
        手机端代购订单管理后台
      </div>

    </div>

    <div class="card">

      <div class="input-group">

        <label class="label">
          系统密码
        </label>

        <input
          id="password"
          class="input"
          type="password"
          placeholder="请输入系统密码"
        />

      </div>

      <button
        id="loginBtn"
        class="login-btn"
        onclick="login()"
      >
        登录系统
      </button>

      <div
        id="status"
        class="status"
      ></div>

    </div>

    <div class="bottom">
      Powered by Cloudflare
    </div>

  </div>

  <script>

    async function login(){

      const password =
        document.getElementById('password').value

      const status =
        document.getElementById('status')

      const button =
        document.getElementById('loginBtn')

      if(!password){

        status.style.color = 'red'
        status.innerText = '请输入密码'

        return
      }

      button.disabled = true
      button.innerText = '登录中...'

      status.innerText = ''

      try{

        const res = await fetch(
          'YOUR_WORKER_URL/api/login',
          {

            method:'POST',

            headers:{
              'Content-Type':'application/json'
            },

            body:JSON.stringify({
              password
            })

          }
        )

        const data = await res.json()

        if(data.success){

          status.style.color = 'green'
          status.innerText = '登录成功'

          localStorage.setItem(
            'daigou_login',
            'true'
          )

          setTimeout(() => {

            window.location.href =
              '/home.html'

          }, 1000)

        }else{

          status.style.color = 'red'
          status.innerText = '密码错误'

        }

      }catch(err){

        status.style.color = 'red'
        status.innerText = '服务器连接失败'

      }

      button.disabled = false
      button.innerText = '登录系统'

    }

  </script>

</body>
</html>
