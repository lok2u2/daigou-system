<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>中越代购系统</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      font-family:sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:380px;
    }

    .logo{
      text-align:center;
      color:white;
      margin-bottom:40px;
    }

    .logo-icon{
      font-size:56px;
      margin-bottom:12px;
    }

    .logo-title{
      font-size:32px;
      font-weight:bold;
    }

    .logo-sub{
      color:#999;
      margin-top:10px;
      font-size:14px;
    }

    .card{
      background:white;
      border-radius:32px;
      padding:24px;
    }

    .input-group{
      margin-bottom:20px;
    }

    .label{
      font-size:14px;
      color:#666;
      margin-bottom:8px;
      display:block;
    }

    .input{
      width:100%;
      border:1px solid #ddd;
      border-radius:18px;
      padding:16px;
      font-size:16px;
      outline:none;
    }

    .input:focus{
      border-color:black;
    }

    .login-btn{
      width:100%;
      background:black;
      color:white;
      border:none;
      border-radius:20px;
      padding:16px;
      font-size:18px;
      margin-top:10px;
      cursor:pointer;
    }

    .demo{
      background:#f5f5f5;
      border-radius:18px;
      padding:16px;
      margin-top:20px;
      font-size:14px;
      color:#666;
    }

    .demo-title{
      color:black;
      font-weight:bold;
      margin-bottom:10px;
    }

    .bottom{
      text-align:center;
      color:#666;
      font-size:12px;
      margin-top:24px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="logo">

      <div class="logo-icon">
        📦
      </div>

      <div class="logo-title">
        中越代购系统
      </div>

      <div class="logo-sub">
        手机端代购订单管理后台
      </div>

    </div>

    <div class="card">

      <div class="input-group">
        <label class="label">
          账号
        </label>

        <input
          class="input"
          type="text"
          placeholder="请输入账号"
        />
      </div>

      <div class="input-group">
        <label class="label">
          密码
        </label>

        <input
          class="input"
          type="password"
          placeholder="请输入密码"
        />
      </div>

      <button class="login-btn">
        登录系统
      </button>

      <div class="demo">

        <div class="demo-title">
          测试账号
        </div>

        <div>
          账号：admin
        </div>

        <div style="margin-top:6px;">
          密码：123456
        </div>

      </div>

    </div>

    <div class="bottom">
      Powered by Cloudflare
    </div>

  </div>

</body>
</html>
