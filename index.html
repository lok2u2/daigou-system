<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>代购管理系统</title>

  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#f5f5f5;
    }

    .header{
      background:black;
      color:white;
      padding:20px;
      font-size:24px;
      font-weight:bold;
    }

    .card{
      background:white;
      margin:16px;
      padding:20px;
      border-radius:20px;
    }

    .number{
      font-size:32px;
      font-weight:bold;
      margin-top:10px;
    }
  </style>
</head>

<body>

  <div class="header">
    中越代购系统
  </div>

  <div class="card">
    今日销售额
    <div class="number">
      ¥2300
    </div>
  </div>

  <div class="card">
    今日利润
    <div class="number">
      ¥420
    </div>
  </div>

</body>
</html>
