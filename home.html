<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>中越代购系统</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:sans-serif;
    }

    body{
      background:#f5f5f5;
      padding-bottom:90px;
    }

    /* ===== 顶部 ===== */
    .header{
      background:black;
      color:white;
      padding:20px;
      border-radius:0 0 24px 24px;
    }

    .title{
      font-size:22px;
      font-weight:bold;
      margin-bottom:12px;
    }

    .search{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:none;
      outline:none;
    }

    /* ===== 快捷功能 ===== */
    .section{
      padding:15px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .card{
      background:white;
      border-radius:18px;
      padding:16px;
      box-shadow:0 2px 8px rgba(0,0,0,0.05);
      cursor:pointer;
    }

    .icon{
      font-size:26px;
    }

    .card-title{
      font-weight:bold;
      margin-top:6px;
    }

    .card-sub{
      font-size:12px;
      color:#666;
    }

    /* ===== 弹窗 ===== */
    .modal{
      display:none;
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.6);
      padding:20px;
      z-index:999;
    }

    .modal-box{
      background:white;
      border-radius:20px;
      padding:18px;
      max-width:420px;
      margin:auto;
      margin-top:40px;
    }

    .modal-box h2{
      margin-bottom:10px;
    }

    input,select{
      width:100%;
      padding:10px;
      margin:6px 0;
      border:1px solid #ddd;
      border-radius:10px;
      outline:none;
    }

    .btn{
      width:100%;
      padding:12px;
      background:black;
      color:white;
      border:none;
      border-radius:12px;
      margin-top:10px;
    }

    .close{
      background:#eee;
      color:black;
    }

    /* ===== 订单卡片 ===== */
    .order{
      background:white;
      padding:14px;
      border-radius:16px;
      margin-bottom:10px;
    }

    .status{
      font-size:12px;
      color:green;
    }

  </style>
</head>

<body>

<!-- ===== 顶部 ===== -->
<div class="header">
  <div class="title">中越代购系统</div>
  <input class="search" placeholder="搜索订单 / 客户 / 运单号"/>
</div>

<!-- ===== 快捷功能 ===== -->
<div class="section">

  <div class="grid">

    <div class="card" onclick="openModal()">
      <div class="icon">➕</div>
      <div class="card-title">新增订单</div>
      <div class="card-sub">录入商品</div>
    </div>

    <div class="card">
      <div class="icon">📦</div>
      <div class="card-title">订单列表</div>
      <div class="card-sub">查看全部</div>
    </div>

  </div>

</div>

<!-- ===== 订单列表 ===== -->
<div class="section">
  <h3>最近订单</h3>
  <div id="orders"></div>
</div>

<!-- ===== 弹窗 ===== -->
<div class="modal" id="modal">

  <div class="modal-box">

    <h2>新增订单</h2>

    <input id="customer" placeholder="客户名称">
    <input id="phone" placeholder="电话">

    <select id="platform">
      <option>淘宝</option>
      <option>拼多多</option>
      <option>1688</option>
      <option>京东</option>
      <option>其他</option>
    </select>

    <input id="product" placeholder="商品名称">
    <input id="orderId" placeholder="平台订单号">
    <input id="track" placeholder="运单尾号4位">

    <input id="cny" placeholder="人民币金额">
    <input id="vnd" placeholder="越南盾金额">

    <button class="btn" onclick="submitOrder()">提交订单</button>
    <button class="btn close" onclick="closeModal()">关闭</button>

  </div>

</div>

<script>

const API = "https://daigou-api.lok2u2.workers.dev"

function openModal(){
  document.getElementById("modal").style.display="block"
}

function closeModal(){
  document.getElementById("modal").style.display="none"
}

async function submitOrder(){

  const data = {
    customer: customer.value,
    phone: phone.value,
    platform: platform.value,
    product: product.value,
    platform_order_id: orderId.value,
    tracking_last4: track.value,
    amount_cny: Number(cny.value),
    amount_vnd: Number(vnd.value)
  }

  const res = await fetch(API + "/api/order/create", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  })

  const result = await res.json()

  if(result.success){
    alert("添加成功")
    closeModal()
    loadOrders()
  }else{
    alert("失败")
  }
}

async function loadOrders(){

  const res = await fetch(API + "/api/order/list")
  const data = await res.json()

  const box = document.getElementById("orders")
  box.innerHTML = ""

  data.slice(0,5).forEach(o => {

    box.innerHTML += `
      <div class="order">
        <b>${o.customer}</b><br/>
        ${o.product}<br/>
        <span class="status">${o.status}</span>
      </div>
    `
  })

}

loadOrders()

</script>

</body>
</html>
