# 修复版 home.html（按钮全部可点击）

```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>中越代购ERP</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  background: #f5f5f5;
  padding-bottom: 100px;
}

.header {
  background: #111827;
  color: white;
  padding: 20px;
  border-radius: 0 0 20px 20px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

  font-size: 24px;
  font-weight: bold;
}

.lang-btn {
  border: none;
  background: white;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
}

.search-wrap {
  display: flex;
  gap: 10px;
}

.search {
  flex: 1;
  border: none;
  padding: 12px;
  border-radius: 12px;
}

.search-btn {
  border: none;
  background: white;
  padding: 0 16px;
  border-radius: 12px;
  cursor: pointer;
}

.section {
  padding: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.card-title {
  color: #666;
  margin-bottom: 8px;
}

.card-value {
  font-size: 24px;
  font-weight: bold;
}

.add-btn {
  width: 100%;
  border: none;
  background: #111827;
  color: white;
  border-radius: 16px;
  padding: 15px;
  text-align: left;
  cursor: pointer;
}

.order {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.order-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

  margin-bottom: 5px;
}

.status {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 10px;
  border-radius: 10px;
  color: white;
  font-size: 12px;

.pending {
  background: orange;
}

  background: #2563eb;
}

  background: #7c3aed;
}

}

  margin-top: 12px;
}

.btn {
  border: none;
  padding: 8px 10px;
  border-radius: 10px;
  margin-right: 6px;
  margin-top: 6px;
  cursor: pointer;
  color: white;
}

.blue {
  background: #2563eb;
}

.purple {
  background: #7c3aed;
}

.green {
  background: #16a34a;
}

.dark {
  background: #111827;
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;

  background: rgba(0,0,0,0.5);
  z-index: 9999;
  padding: 20px;
}

.modal-box {
  background: white;
  border-radius: 20px;
  padding: 20px;
  max-width: 500px;
  margin: auto;
  margin-top: 40px;
}

  width: 100%;

.close-btn {
  width: 100%;
  border: none;
  padding: 14px;
  border-radius: 12px;

  background: #111827;

}

  background: #ddd;
}

canvas {
  background: white;
  border-radius: 16px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="header">

  <div class="header-top">
    <div class="title" id="titleText">中越代购ERP</div>

    <button class="lang-btn" onclick="toggleLanguage()">
      中文 / VI
    </button>
  </div>

  <div class="search-wrap">

    <input
      id="searchInput"
      class="search"
      placeholder="搜索客户 / 商品 / 订单号"
      oninput="loadOrders()"
    />

    <button class="search-btn" onclick="loadOrders()">
      搜索
    </button>

  </div>

</div>

<div class="section">

  <h2 style="margin-bottom:12px;">财务统计</h2>

  <div class="grid">

    <div class="card">
      <div class="card-title">总订单</div>
      <div class="card-value" id="totalOrders">0</div>
    </div>

    <div class="card">
      <div class="card-title">人民币</div>
      <div class="card-value" id="totalCny">0</div>
    </div>

    <div class="card">
      <div class="card-title">越南盾</div>
      <div class="card-value" id="totalVnd">0</div>
    </div>

    <button class="add-btn" onclick="openModal()">
      <div style="font-size:18px;font-weight:bold;">
        ➕ 新增订单
      </div>

      <div style="margin-top:6px;font-size:12px;opacity:0.8;">
        添加新的代购商品
      </div>
    </button>

  </div>

</div>

<div class="section">
  <h2 style="margin-bottom:12px;">平台统计</h2>
  <canvas id="chart"></canvas>
</div>

<div class="section">
  <h2 style="margin-bottom:12px;">订单列表</h2>
  <div id="orders"></div>
</div>

<div class="modal" id="modal">

  <div class="modal-box">

    <h2 style="margin-bottom:15px;">新增订单</h2>

    <input id="customer" class="input" placeholder="客户名称" />

    <input id="phone" class="input" placeholder="微信 / Zalo" />

    <select id="platform" class="input">
      <option>淘宝</option>
      <option>拼多多</option>
      <option>1688</option>
      <option>京东</option>
      <option>其他</option>
    </select>

    <input id="product" class="input" placeholder="商品名称" />

    <input id="orderId" class="input" placeholder="平台订单号" />

    <input id="track" class="input" placeholder="物流尾号" />

    <input id="cny" class="input" placeholder="人民币金额" />

    <input id="vnd" class="input" placeholder="越南盾金额" />

    <button class="submit-btn" onclick="submitOrder()">
      提交订单
    </button>

    <button class="close-btn" onclick="closeModal()">
      关闭
    </button>

  </div>

</div>

<script>

const API = "https://apibuy.okla.de5.net"

let currentLang = "zh"

function openModal(){
  document.getElementById("modal").style.display = "block"
}

function closeModal(){
  document.getElementById("modal").style.display = "none"
}

function toggleLanguage(){

  const title = document.getElementById("titleText")

  if(currentLang === "zh"){
    currentLang = "vi"
    title.innerText = "Hệ thống mua hộ"
  }else{
    currentLang = "zh"
    title.innerText = "中越代购ERP"
  }

}

async function submitOrder(){

  const data = {
    customer: document.getElementById("customer").value,
    phone: document.getElementById("phone").value,
    platform: document.getElementById("platform").value,
    product: document.getElementById("product").value,
    platform_order_id: document.getElementById("orderId").value,
    tracking_last4: document.getElementById("track").value,
    amount_cny: Number(document.getElementById("cny").value || 0),
    amount_vnd: Number(document.getElementById("vnd").value || 0)
  }

  const res = await fetch(API + "/api/order/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })

  const result = await res.json()

  if(result.success){

    alert("订单创建成功")

    closeModal()

    loadOrders()

    loadStats()

  }else{

    alert("创建失败")

  }

}

async function setStatus(id,status){

  await fetch(API + "/api/order/update", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id,
      status
    })
  })

  loadOrders()

}

function copyNotify(text){

  navigator.clipboard.writeText(text)

  alert("已复制通知")

}

async function loadOrders(){

  const keyword =
    document
    .getElementById("searchInput")
    .value
    .toLowerCase()

  const res = await fetch(API + "/api/order/list")

  const data = await res.json()

  const box = document.getElementById("orders")

  box.innerHTML = ""

  const filtered = data.filter(o => {

    return (
      (o.customer || "").toLowerCase().includes(keyword) ||
      (o.product || "").toLowerCase().includes(keyword) ||
      (o.platform_order_id || "").toLowerCase().includes(keyword)
    )

  })

  filtered.forEach(o => {

    box.innerHTML += `

      <div class="order">

        <div class="order-title">
          ${o.customer || "-"}
        </div>

        <div class="order-line">
          商品：${o.product || "-"}
        </div>

        <div class="order-line">
          平台：${o.platform || "-"}
        </div>

        <div class="order-line">
          订单号：${o.platform_order_id || "-"}
        </div>

        <div class="order-line">
          运单尾号：${o.tracking_last4 || "-"}
        </div>

        <div class="order-line">
          联系方式：${o.phone || "-"}
        </div>

        <div class="order-line">
          人民币：¥${o.amount_cny || 0}
        </div>

        <div class="order-line">
          越南盾：${o.amount_vnd || 0}₫
        </div>

        <div class="status ${o.status}">
          ${o.status}
        </div>

        <div class="btn-group">

          <button class="btn blue" onclick="setStatus(${o.id},'arrived')">
            已到仓
          </button>

          <button class="btn purple" onclick="setStatus(${o.id},'notified')">
            已通知
          </button>

          <button class="btn green" onclick="setStatus(${o.id},'shipped')">
            已发货
          </button>

          <button class="btn dark" onclick="copyNotify(`Khách hàng: ${o.customer}\n\nSản phẩm: ${o.product}\n\nMã đơn: ${o.platform_order_id}\n\nMã vận đơn: ${o.tracking_last4}\n\nVui lòng gửi về Hà Nội.`)">
            复制通知
          </button>

        </div>

      </div>

    `

  })

}

async function loadStats(){

  const res = await fetch(API + "/api/stats")

  const data = await res.json()

  document.getElementById("totalOrders").innerText = data.total_orders
  document.getElementById("totalCny").innerText = data.total_cny
  document.getElementById("totalVnd").innerText = data.total_vnd

  const labels = data.platforms.map(p => p.platform)
  const values = data.platforms.map(p => p.total)

  const chartEl = document.getElementById("chart")

  if(window.orderChart){
    window.orderChart.destroy()
  }

  window.orderChart = new Chart(chartEl, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "订单数量",
        data: values
      }]
    }
  })

}

loadOrders()
loadStats()

</script>

</body>
</html>
```
