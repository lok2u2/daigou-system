<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>代购系统</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:sans-serif;
    }

    body{
      background:#f5f5f5;
      padding-bottom:90px;
    }

    .header{
      background:black;
      color:white;
      padding:18px;
      border-radius:0 0 20px 20px;
    }

    .title{
      font-size:20px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .search{
      width:100%;
      padding:10px;
      border-radius:12px;
      border:none;
      outline:none;
    }

    .section{
      padding:15px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .card{
      background:white;
      padding:14px;
      border-radius:16px;
      cursor:pointer;
    }

    .icon{
      font-size:24px;
    }

    .card-title{
      font-weight:bold;
      margin-top:5px;
    }

    .card-sub{
      font-size:12px;
      color:#666;
    }

    .order{
      background:white;
      padding:12px;
      border-radius:14px;
      margin-bottom:10px;
    }

    button{
      margin-top:6px;
      margin-right:5px;
      padding:6px 10px;
      border:none;
      border-radius:10px;
      font-size:12px;
      cursor:pointer;
    }

    .modal{
      display:none;
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.5);
      padding:20px;
    }

    .box{
      background:white;
      padding:15px;
      border-radius:16px;
      max-width:420px;
      margin:auto;
      margin-top:40px;
    }

    input,select{
      width:100%;
      padding:10px;
      margin:6px 0;
      border-radius:10px;
      border:1px solid #ddd;
    }

    .btn{
      width:100%;
      padding:10px;
      background:black;
      color:white;
      border:none;
      border-radius:10px;
    }

  </style>
</head>

<body>

<div class="header">
  <div class="title">代购系统</div>
  <input class="search" placeholder="搜索订单"/>
</div>

<div class="section">

  <div class="grid">

    <div class="card" onclick="openModal()">
      <div class="icon">➕</div>
      <div class="card-title">新增订单</div>
      <div class="card-sub">录入商品</div>
    </div>

  </div>

</div>

<div class="section">
  <h3>订单列表</h3>
  <div id="orders"></div>
</div>

<!-- 弹窗 -->
<div class="modal" id="modal">

  <div class="box">

    <h3>新增订单</h3>

    <input id="customer" placeholder="客户名">
    <input id="phone" placeholder="电话">

    <select id="platform">
      <option>淘宝</option>
      <option>拼多多</option>
      <option>1688</option>
      <option>京东</option>
      <option>其他</option>
    </select>

    <input id="product" placeholder="商品">
    <input id="orderId" placeholder="平台订单号">
    <input id="track" placeholder="运单尾号">

    <input id="cny" placeholder="人民币">
    <input id="vnd" placeholder="越南盾">

    <button class="btn" onclick="submitOrder()">提交</button>
    <button class="btn" style="background:#ccc;color:black;" onclick="closeModal()">关闭</button>

  </div>

</div>

<script>

const API = "https://apibuy.okla.de5.net"

// 打开弹窗
function openModal(){
  document.getElementById("modal").style.display="block"
}

// 关闭弹窗
function closeModal(){
  document.getElementById("modal").style.display="none"
}

// 提交订单
async function submitOrder(){

  const data = {
    customer: customer.value,
    phone: phone.value,
    platform: platform.value,
    product: product.value,
    platform_order_id: orderId.value,
    tracking_last4: track.value,
    amount_cny: Number(cny.value),
    amount_vnd: Number(vnd.value)
  }

  const res = await fetch(API + "/api/order/create", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify(data)
  })

  const result = await res.json()

  if(result.success){
    alert("创建成功")
    closeModal()
    loadOrders()
  }else{
    alert("失败")
  }
}

// 加载订单
async function loadOrders(){

  const res = await fetch(API + "/api/order/list")
  const data = await res.json()

  const box = document.getElementById("orders")
  box.innerHTML = ""

  data.forEach(o => {

    box.innerHTML += `
      <div class="order">

        <b>${o.customer}</b><br/>
        ${o.product}<br/>
        <small>状态：${o.status}</small><br/>

        <button onclick="setStatus(${o.id},'arrived')">已到仓</button>
        <button onclick="setStatus(${o.id},'notified')">已通知</button>
        <button onclick="setStatus(${o.id},'shipped')">已发货</button>

      </div>
    `
  })
}

// 更新状态
async function setStatus(id,status){

  await fetch(API + "/api/order/update", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      id,
      status
    })
  })

  loadOrders()
}

// 初始化
loadOrders()

</script>

</body>
</html>
